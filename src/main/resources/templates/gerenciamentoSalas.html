<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciamento de Salas</title>
    <link rel="stylesheet" href="TupiNet.css" >
</head>
<body>

<div class="painel-container">
    <img class="logo" src="imagens/logo/logo.png" alt="Logo TupiNet">
    <div class="header">
        <h1 id="title1" style="font-size: 40px;">Professor</h1>
    </div>
    <div class="salas-container">
        <div class="salas-header">
            <h3>Gerenciar salas</h3>
            <button class="adicionar-sala">+ Adicionar sala</button>
        </div>
        <div class="sala">
            <span>Sala 01</span>
            <span>X2040L</span>
            <a href="#" class="ver">VER</a>
            <a href="#" class="excluir">EXCLUIR</a>
        </div>
        <div class="sala">
            <span>Sala 02</span>
            <span>M5320P</span>
            <a href="#" class="ver">VER</a>
            <a href="#" class="excluir">EXCLUIR</a>

        </div>
        <div class="sala">
            <span>Sala 03</span>
            <span>V32PLZ</span>
            <a href="#" class="ver">VER</a>
            <a href="#" class="excluir">EXCLUIR</a>
        </div>
    </div>
</div>
<img src="imagens/nuvens/Nuvem1.png" class="cloud" id="cloud1">
<img src="imagens/nuvens/Nuvem2.png" class="cloud" id="cloud2">
<img src="imagens/nuvens/Nuvem3.png" class="cloud" id="cloud3">
<footer>
    <img class="footer" src="imagens/footer/footer.png" alt="">
</footer>
</body>
</html>
