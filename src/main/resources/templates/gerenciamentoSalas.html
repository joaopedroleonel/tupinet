<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerenciamento de Salas</title>
  <link rel="stylesheet" th:href="@{/TupiNet.css}" href="TupiNet.css">
  <style>
    .lista-salas-scroll {
        max-height: 300px;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: #ccc #f5f5f5;
    }
    .lista-salas-scroll::-webkit-scrollbar {
        width: 6px;
        background: transparent;
    }
    .lista-salas-scroll::-webkit-scrollbar-thumb {
        background: transparent;
        border-radius: 12px;
        transition: background 0.3s;
    }
    .lista-salas-scroll:hover::-webkit-scrollbar-thumb {
        background: #bdbdbd;
    }
    .lista-salas-scroll::-webkit-scrollbar-track {
        background: transparent;
    }
  </style>
</head>
<body>

<div class="painel-container">
  <img class="logo" th:src="@{/imagens/logo/logo.png}" src="imagens/logo/logo.png" alt="Logo TupiNet">
  <div class="salas-container">
    <div class="salas-header">
      <h3>Gerenciar salas</h3>
      <a th:href="@{/salas/novo}"><button class="adicionar-sala">+ Adicionar sala</button></a>
    </div>

    <!-- Bloco com rolagem para as salas -->
    <div class="lista-salas-scroll">
      <div th:if="${salas != null}">
        <div th:each="sala : ${salas}" class="sala">
          <span th:text="${sala.nome}">Nome da Sala</span>
          <span th:text="${sala.codigo}">CODIGO</span>
          <a th:href="@{'/salas/editar/' + ${sala.id}}" class="ver">VER</a>
          <a href="javascript:void(0);"
             th:attr="onclick=|abrirModal('${sala.nome}', ${sala.id})|"
             class="excluir">EXCLUIR</a>
        </div>
      </div>
    </div>
    <!-- Fim bloco com rolagem -->
  </div>
</div>
<img th:src="@{/imagens/nuvens/Nuvem1.png}" src="imagens/nuvens/Nuvem1.png" class="cloud" id="cloud1">
<img th:src="@{/imagens/nuvens/Nuvem2.png}" src="imagens/nuvens/Nuvem2.png" class="cloud" id="cloud2">
<img th:src="@{/imagens/nuvens/Nuvem3.png}" src="imagens/nuvens/Nuvem3.png" class="cloud" id="cloud3">

<footer>
  <img class="footer" th:src="@{/imagens/footer/footer.png}" src="imagens/footer/footer.png" alt="">
</footer>

<!-- Modal de confirmação de exclusão -->
<div id="modal-excluir" class="modal-overlay">
  <div class="modal-conteudo">
    <form th:action="@{'/salas/excluir/' + ${salaIdParaExcluir}}" method="post">
      <p>Deseja excluir a Sala <strong id="nome-sala-excluir">?</strong></p>
      <div class="botoes-excluir">
        <button type="button" onclick="fecharModal()" class="cancelar-btn">CANCELAR</button>
        <button type="submit" class="excluir-btn">EXCLUIR</button>
      </div>
    </form>
  </div>
</div>

<script>
  function abrirModal(nomeSala, idSala) {
  document.getElementById("nome-sala-excluir").textContent = nomeSala;
  document.getElementById("modal-excluir").style.display = "flex";
  document.querySelector('#modal-excluir form').action = '/salas/excluir/' + idSala;
}

  function fecharModal() {
  document.getElementById("modal-excluir").style.display = "none";
}

</script>

</body>
</html>
