<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ranking - TupiNet</title>
  <link rel="stylesheet" th:href="@{/verSalas.css}" href="verSalas.css">
</head>
<body>
<div class="painel-container">
  <h1 class="title-ranking">Ranking!</h1>
  <div class="board">
    <div class="ranking-row" th:each="aluno, iterStat : ${rankingList}">
      <span th:text="${iterStat.count} + 'º'"></span>
      <span th:text="${aluno.aluno}">Nome</span>
      <span th:text="${aluno.nome}">Jogo</span>
      <span th:text="${aluno.pontos} + ' pts'" class="pontuacao">Pontos</span>
    </div>
  </div>
</div>

<!-- Nuvens -->
<img th:src="@{/imagens/nuvens/Nuvem1.png}" src="imagens/nuvens/Nuvem1.png" class="cloud" id="cloud1">
<img th:src="@{/imagens/nuvens/Nuvem2.png}" src="imagens/nuvens/Nuvem2.png" class="cloud" id="cloud2">
<img th:src="@{/imagens/nuvens/Nuvem3.png}" src="imagens/nuvens/Nuvem3.png" class="cloud" id="cloud3">

<!-- Rodapé -->
<footer>
  <img th:src="@{/imagens/footer/footer.png}" class="footer" src="imagens/footer/footer.png" alt="Rodapé TupiNet">
</footer>

<script>
  // Função para pegar parâmetros da URL
  function getParametro(nome) {
    const params = new URLSearchParams(window.location.search);
    return params.get(nome);
  }

  const sala = getParametro('sala') || 'Sala Desconhecida';
  const codigo = getParametro('codigo') || '';

  // Altera o título da página
  document.title = 'Ranking - ' + sala;

  // Altera o header da sala
  const header = document.querySelector('.salas-header h3');
  if (header) {
    header.textContent = 'Ranking - ' + sala + (codigo ? ' (' + codigo + ')' : '');
  }
</script>

</body>
</html>
