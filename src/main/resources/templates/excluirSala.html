<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmar Exclusão - TupiNet</title>
  <link rel="stylesheet" href="TupiNet.css" />
</head>
<body>

<div class="painel-container">
  <img class="logo" src="imagens/logo/logo.png" alt="Logo TupiNet" />

  <h2 class="titulo-professor">Professor</h2>

  <div class="salas-container">
    <h3>Gerenciar salas</h3>

    <div class="modal-excluir">
      <p class="mensagem-excluir">Deseja excluir a Sala <strong>X</strong>?</p>
      <div class="botoes-excluir">
        <button class="cancelar-btn">CANCELAR</button>
        <button class="excluir-btn">EXCLUIR</button>
      </div>
    </div>

    <button class="adicionar-sala">+ Adicionar sala</button>
  </div>
</div>

<!-- Nuvens -->
<img src="imagens/nuvens/Nuvem1.png" class="cloud" id="cloud1" />
<img src="imagens/nuvens/Nuvem2.png" class="cloud" id="cloud2" />
<img src="imagens/nuvens/Nuvem3.png" class="cloud" id="cloud3" />

<!-- Rodapé -->
<footer>
  <img class="footer" src="imagens/footer/footer.png" alt="Rodapé TupiNet" />
</footer>

</body>
</html>
