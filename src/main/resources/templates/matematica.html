<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="stylesheet" href="supercalculo.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Super Cálculo</title>
</head>
<body>
<div class="container">
    <img class="logo" src="imagens/logo/logo.png" alt="">
    <div class="title">
        <h1 id="title1">Super Cálculo</h1>
    </div>
    <div class="supercalculo-wrapper">

        <div class="quiz-header">
            <div class="questao-atual"></div>
            <div class="nivel-selector">
                <button class="nivel-btn" data-nivel="facil">Fácil</button>
                <button class="nivel-btn" data-nivel="medio">Médio</button>
                <button class="nivel-btn" data-nivel="dificil">Difícil</button>
            </div>
            <div class="cronometro"></div>
        </div>
        <div class="score-exibicao"></div>

        <div class="botoes-e-quadrado">
            <button class="botao-apagar">apagar</button>
            <div class="calculo-quadrado">
                <span class="calcule-label">calcule:</span>
                <div class="calculo-central">2 + 2 = _</div>
            </div>
            <button class="botao-enviar">enviar</button>
        </div>
        <div class="numeros-painel">
            <div class="numeros-linha">
                <div class="numero-quadrado">0</div>
                <div class="numero-quadrado">1</div>
                <div class="numero-quadrado">2</div>
                <div class="numero-quadrado">3</div>
                <div class="numero-quadrado">4</div>
            </div>
            <div class="numeros-linha">
                <div class="numero-quadrado">5</div>
                <div class="numero-quadrado">6</div>
                <div class="numero-quadrado">7</div>
                <div class="numero-quadrado">8</div>
                <div class="numero-quadrado">9</div>
            </div>
        </div>
    </div>
    <footer>
        <img class="footer" src="imagens/footer/footer.png" alt="">
    </footer>
</div>
<img src="imagens/nuvens/Nuvem1.png" class="cloud" id="cloud1">
<img src="imagens/nuvens/Nuvem2.png" class="cloud" id="cloud2">
<img src="imagens/nuvens/Nuvem3.png" class="cloud" id="cloud3">

<script src="supercalculo.js"></script>
</body>
</html>
