<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="stylesheet" href="/frontAluno.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entrar na Sala</title>


</head>
<body>
<!--cor mais leve (185,215,234) cor mais pesada (118,159,205) ou original (84,172,244)-->
<div class="container">
    <img class="logo" src="imagens/logo/logo.png" alt="">

    <div class="title">
        <h1 id="title1">Código da sala: <span>X2040L</span></h1>

    </div>

    <div class="login-container">
        <p class="titulo">Selecione o Jogo:</p>
        <div class="jogos-grid">
            <div class="jogo-card">
                <img src="imagens/jogos/caca-palavras.jpg" alt="Jogo 1">
            </div>
            <div class="jogo-card">
                <img src="imagens/jogos/memor.jpg" alt="Jogo 2">
            </div>
            <div class="jogo-card">
                <img src="imagens/jogos/palavreca.jpg" alt="Jogo 3">
            </div>
            <div class="jogo-card">
                <img src="imagens/jogos/super.png" alt="Jogo 4">
            </div>
        </div>

        <div class="jogar-container">
            <button class="jogar">Jogar</button>
        </div>

    </div>

    <footer>
        <img class="footer" src="imagens/footer/footer.png" alt="">
    </footer>

</div>
<img src="imagens/nuvens/Nuvem1.png" class="cloud" id="cloud1">
<img src="imagens/nuvens/Nuvem2.png" class="cloud" id="cloud2">
<img src="imagens/nuvens/Nuvem3.png" class="cloud" id="cloud3">

<script>
    const jogoCards = document.querySelectorAll('.jogo-card');
    const botaoJogar = document.querySelector('.jogar');

    jogoCards.forEach(card => {
        card.addEventListener('click', () => {
            jogoCards.forEach(c => c.classList.remove('selecionado'));
            card.classList.add('selecionado');
        });
    });

    botaoJogar.addEventListener('click', () => {
        jogoCards.forEach(c => c.classList.remove('selecionado'));
    });
</script>
</body>
</html>
